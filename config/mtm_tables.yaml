# MTM时间表配置文件
# 版本：v1.0
# 日期：2025-05-21
# 来源：MTM-1标准动作要素时间值

# TMU时间单位换算
tmu_conversion:
  hours_per_tmu: 0.00001
  minutes_per_tmu: 0.0006
  seconds_per_tmu: 0.036

# Reach（伸手）时间表
reach:
  # A类（短距离 <10cm）
  A_short:
    distance_cm: "<10"
    tmu: 8
    description: "伸手到固定位置或另一手位置"

  # B类（中距离 10-25cm）
  A_medium:
    distance_cm: "10-25"
    tmu: 15
    description: "伸手到单循环位置"

  # C类（长距离 >25cm）
  A_long:
    distance_cm: ">25"
    tmu: 22
    description: "伸手到不确定位置"

  # B类变体（伸手到移动目标）
  B_cases:
    B1:
      condition: "伸手到固定目标"
      tmu_adjustment: 0
    B2:
      condition: "伸手到移动目标"
      tmu_adjustment: +3
    B3:
      condition: "伸手到微小目标"
      tmu_adjustment: +5

# Grasp（抓取）时间表
grasp:
  # G1：简单抓取
  G1:
    tmu: 5
    description: "抓取容易拿取的小、中、大物体"
    examples:
      - "抓取桌面上的零件"
      - "抓取工具柄"

  # G2：调整抓取
  G2:
    tmu: 8
    description: "抓取时需要调整位置"

  # G3：传递抓取
  G3:
    tmu: 8
    description: "从一手传递到另一手"

  # G4：选取抓取
  G4:
    tmu: 10
    description: "从混杂物体中选取一个"

  # G5：接触抓取
  G5:
    tmu: 12
    description: "接触、滑动、钩住"
    examples:
      - "滑动零件到目标位置"
      - "钩住把手"

# Move（移动）时间表
move:
  # A类（短距离 <10cm）
  A_short:
    distance_cm: "<10"
    tmu: 10
    description: "移动到固定位置"

  # B类（中距离 10-25cm）
  A_medium:
    distance_cm: "10-25"
    tmu: 18
    description: "移动到单循环位置"

  # C类（长距离 >25cm）
  A_long:
    distance_cm: ">25"
    tmu: 26
    description: "移动到不确定位置"

  # 重量调整
  weight_adjustments:
    lightweight:
      weight_kg: "<1"
      tmu_add: 0
    medium:
      weight_kg: "1-5"
      tmu_add: 5
    heavy:
      weight_kg: ">5"
      tmu_add: 12

# Position（定位）时间表
position:
  # P1：简单定位（松配合）
  P1:
    tmu: 10
    description: "定位到粗糙位置"
    symmetry: "不需要对称"

  # P2：中等定位
  P2:
    tmu: 20
    description: "定位到中等精度位置"
    symmetry: "需要粗略对称"

  # P3：精密定位（紧配合）
  P3:
    tmu: 30
    description: "定位到精密位置"
    symmetry: "需要精确对称"
    examples:
      - "装配精密零件"
      - "对齐螺丝孔"

# Release（放开）时间表
release:
  # RL1：简单放开
  RL1:
    tmu: 2
    description: "正常放开"
    examples:
      - "放开工具"
      - "放下零件"

  # RL2：调整放开
  RL2:
    tmu: 4
    description: "需要调整的放开"

  # RL3：复杂放开
  RL3:
    tmu: 8
    description: "复杂放开操作"

# Wait（等待）时间表
wait:
  # Wait不计入标准工时，仅用于效率分析
  description: "等待动作不产生工时"
  tmu: 0
  efficiency_impact:
    loss_rate_threshold_warning: 0.10
    loss_rate_threshold_critical: 0.20

# Assemble组合动作（非MTM-1标准，工业实践）
assemble:
  description: "R + G + M + RL完整序列组合"
  sequence:
    - "Reach"
    - "Grasp"
    - "Move"
    - "Release"

  # 效率折扣
  efficiency_factor:
    simple: 0.9   # 简单装配 10%折扣
    complex: 1.0  # 复杂装配 无折扣

  # 时间计算
  calculation:
    method: "sum_of_actions"
    discount: "simple"

# 宽放率配置
allowance:
  # 标准宽放率
  standard_rate: 0.15  # 15%

  # 宽放类型
  types:
    personal: 0.05     # 个人宽放 5%
    fatigue: 0.04      # 疲劳宽放 4%
    delay: 0.06        # 延迟宽放 6%

  # 环境调整
  environment_factors:
    standing: 0.02     # 站立作业 +2%
    heavy_work: 0.03   # 重体力作业 +3%
    poor_lighting: 0.01 # 照明不良 +1%
    noisy: 0.02        # 噪音环境 +2%