project:
  name: 工业IE智能体演示项目
  client: 内部验证
target:
  lbr_target: 85.0
  cycle_time_target: null
analysis:
  concurrency: 2
  sample_rate: 5            # 视觉抽帧步长：每隔 N 帧跑一次推理（越大越快、越粗）
  mtm_standard: MTM-1
  vision:
    enabled: true
    hand_model: data/models/hand_landmarker.task
    yolo_model: data/models/yolov8n.pt
    min_action_frames: 4
# 工位的 view_type 决定走哪条识别路：
#   top_down → MediaPipe Hands + YOLO（真实识别），其它/缺省 → 时长估算回退
